; ─────────────────────────────────────────────────────────────────────────────
;  The Spotify Turntable — ESP32-S3 firmware
;
;  Board: ESP32-S3-N8R2  (8 MB flash, 2 MB PSRAM, quad-SPI)
;  If your board differs (e.g. N16R8), adjust `board_build.arduino.memory_type`
;  and the flash size below. The generic esp32-s3-devkitc-1 definition works for
;  most S3 dev boards; PSRAM is enabled explicitly via BOARD_HAS_PSRAM.
; ─────────────────────────────────────────────────────────────────────────────

[env:esp32-s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed  = 921600
monitor_filters = esp32_exception_decoder

; ── PSRAM + flash layout for the N8R2 (quad flash + quad PSRAM) ───────────────
board_build.flash_mode          = qio
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size         = 8MB
board_build.partitions          = default_8MB.csv

build_flags =
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=3
  ; Serial goes to the native USB port (labelled "USB"). We use this port because
  ; the UART-bridge ("COM") chip appears to have died in the solder-bridge short.
  ; The ESP32-S3's built-in USB handles both flashing and serial on its own.
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; NOTE: do NOT define NO_GFX here. The HUB75 library checks it with #ifdef
  ; (presence, not value), so even -DNO_GFX=0 would strip the Adafruit-GFX text
  ; methods (setCursor/print/getTextBounds) that display_ui.cpp relies on.

; ── Libraries (pinned; all verified during research) ─────────────────────────
lib_deps =
  https://github.com/mrcodetastic/ESP32-HUB75-MatrixPanel-DMA.git#3.0.14
  https://github.com/witnessmenow/spotify-api-arduino.git
  bitbank2/JPEGDEC @ ^1.6.1
  adafruit/Adafruit NeoPixel @ ^1.12.0
  bblanchon/ArduinoJson @ ^6.21.5
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit BusIO @ ^1.16.1
